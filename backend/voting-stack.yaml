AWSTemplateFormatVersion: "2010-09-09"
Description: Kakao-account linked venue voting API for goyoungo.com

Parameters:
  KakaoAppId:
    Type: String
    Default: "1470643"
    AllowedPattern: "^[0-9]+$"
    Description: Numeric Kakao application ID expected in verified access tokens
  VoteHmacSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: Random secret used only to pseudonymize Kakao user IDs

Resources:
  VoteTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${AWS::StackName}-votes"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: goyoungo
        - Key: Purpose
          Value: kakao-venue-voting

  VoteFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: VoteTableAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                # TransactWriteItems authorizes each underlying item operation.
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:TransactWriteItems
                Resource: !GetAtt VoteTable.Arn
        - PolicyName: VoteFunctionLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-api:*"

  VoteFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-api"
      RetentionInDays: 14

  VoteFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - VoteFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-api"
      Description: Verifies Kakao access tokens and stores one vote per account and venue
      Runtime: nodejs22.x
      Architectures:
        - arm64
      Handler: index.handler
      MemorySize: 256
      Timeout: 12
      Role: !GetAtt VoteFunctionRole.Arn
      Environment:
        Variables:
          VOTE_TABLE_NAME: !Ref VoteTable
          KAKAO_APP_ID: !Ref KakaoAppId
          VOTE_HMAC_SECRET: !Ref VoteHmacSecret
      Code:
        ZipFile: |
          "use strict";

          const crypto = require("node:crypto");
          const { DynamoDBClient } = require("@aws-sdk/client-dynamodb");
          const {
            DynamoDBDocumentClient,
            BatchGetCommand,
            GetCommand,
            PutCommand,
            TransactWriteCommand
          } = require("@aws-sdk/lib-dynamodb");

          const tableName = process.env.VOTE_TABLE_NAME;
          const kakaoAppId = String(process.env.KAKAO_APP_ID || "");
          const hmacSecret = process.env.VOTE_HMAC_SECRET || "";
          const allowedVenueIds = new Set(["7b4c9321-6ad9-4135-b935-b4360a9f1765","f6c67aca-1c10-4d3a-aa67-72185b20dc56","b0f203d8-fed2-44f8-815a-b713bb48ac11","2ac3c5f5-df1a-4c77-8e83-88e0cef85c7e","0314432b-6c08-4bb8-be69-50ea644597ec","1420ef2b-60e3-801e-858b-d7d8edfa7ea2","5ccd0c61-e45c-4513-8bc8-c61084d21594","c55db185-3763-4c92-9577-5ff3a8a65189","501d9bae-1243-40e9-9429-e64cefd040dc","c1235d93-9a9b-4e43-b007-38621a451bda","aa6db810-af0b-428e-ab6e-1f3a73898416","e650f78d-2069-4907-90a5-074461c5264f","3ed621c0-851b-4ad6-b289-04dcf99baa95","926f8d3f-2999-433e-b735-db00bc228cf6","08d7e1ac-e3a9-4d84-8e1a-6d64f37ca7f1","d5891c1c-91fe-45ce-979e-236cc012128d","47b50e58-068b-44f4-b8ae-2140c6b72f78","5b8e324d-d285-4398-b1ec-21a116c09640","2ff4c403-8e5d-48c7-a2e6-c3077290c0b1","c2e2e2a7-adae-4b1b-a583-dc620ae79bae","de9967f0-8c1d-421d-b4ca-e1705c81c760","2d984e33-78df-4b96-a72c-5354729947b7","afe232bf-3df4-4e51-a92a-3df839f889da","5009f7f9-3d27-47a8-91b9-1a60ca13b0f3","4fe11523-f81f-47e0-9a11-31fad96378fe","cf138220-1c77-4508-ab61-4c853155986e","547b10ab-31b7-4962-bb19-1c53436f1e52","967bc5d3-42d4-409d-ba8a-29dd8cfd7788","66097430-29a9-45fd-a7d4-11a53b59a4af","abffd488-3968-431c-a60d-f6081211e9f1","70cb2d37-7e1b-415e-9677-b57a1c36be1d","34f6b63f-6dfa-4c2d-9f37-5aa36f02264a","eab71ef0-bc21-4d15-ac9b-53dfcbad3e21","44a5288f-7b95-4a7a-b4c2-9d5e1adb6340","2072e5e1-9271-484c-8d37-bb2c07d2dff4","2930ef2b-60e3-81d6-b2cd-c3fc9ea5ccec","2930ef2b-60e3-81aa-a2ec-f62774960714","2930ef2b-60e3-81df-81a1-cf2ca04f21e1","2930ef2b-60e3-813f-aaec-d9f34466f24f","2930ef2b-60e3-8115-9602-cb5becfe726f","2930ef2b-60e3-819b-8524-c9ca563fb41e","2930ef2b-60e3-81b8-9f55-e2dd333cb07d","2930ef2b-60e3-8189-ad75-e4f525fce6c3","2930ef2b-60e3-81d2-b723-dd3995489bb5","2930ef2b-60e3-8145-a8e3-d8a70711aa8a","2930ef2b-60e3-8185-8bb0-f9197b92607f","2930ef2b-60e3-8109-8056-d0cba607be53","2930ef2b-60e3-8154-95d7-c5ace16b2a8e","2930ef2b-60e3-810e-a737-ee22969bccaf","2930ef2b-60e3-8119-80a3-e1f67fa22869","2930ef