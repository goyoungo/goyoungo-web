          for (const venueId of ["naver-1009744101","naver-1019677083","naver-1025890119","naver-1038040162","naver-1042315106","naver-1047214092","naver-1078747527","naver-1083274522","naver-1102363087","naver-1105275222","naver-1107242729","naver-1111030372","naver-1119843359","naver-1127910753","naver-1134593291","naver-1137694640","naver-11479224","naver-1152978533","naver-1158228012","naver-11590101","naver-11604737","naver-11614939","naver-11644083","naver-1167275088","naver-11681858","naver-11681869","naver-11681872","naver-11681873","naver-11681904","naver-11691698","naver-11693416","naver-11701126","naver-11710936","naver-11711415","naver-1174748447","naver-11785602","naver-11785626","naver-11785672","naver-11842225","naver-11845629","naver-11845634","naver-11858251","naver-1186542482","naver-11883740","naver-1192999691","naver-1195195046","naver-1196663152","naver-1198994999","naver-1200722229","naver-1202636051","naver-1226502288","naver-1228855459","naver-1254210452","naver-1267120049","naver-1275529876","naver-12812456","naver-12955683","naver-1297461672","naver-12989507","naver-13010931","naver-13047339","naver-1307087805","naver-1315857249","naver-1326500073","naver-13283678","naver-13321079","naver-1332863375","naver-1342752867","naver-13452760","naver-13580550","naver-13588185","naver-1376632115","naver-1383986451","naver-1406996231","naver-1418192234","naver-1423169287","naver-1433610014","naver-1443384375","naver-1443639774","naver-1449784272","naver-1454895584","naver-1470628198","naver-1471478555","naver-1480983376","naver-1483980816","naver-1488696381","naver-1507233491","naver-1512240432","naver-1521415908","naver-1540430844","naver-1547611543","naver-1551055411","naver-1551077525","naver-15519881","naver-15519886","naver-15520675","naver-15520844","naver-15520866","naver-15521265","naver-15521355","naver-15521446","naver-15521513","naver-15550431","naver-15550469","naver-15550550","naver-15550886","naver-15550936","naver-15550980","naver-15551407","naver-15551799","naver-15551895","naver-15551915","naver-15551975","naver-15552082","naver-15553003","naver-15559841","naver-15559948","naver-15560790","naver-15560909","naver-15560912","naver-15560992","naver-15561131","naver-15561501","naver-15561620","naver-15561698","naver-15569706","naver-15569788","naver-15570052","naver-15570146","naver-15570298","naver-15571221","naver-15572817","naver-15573896","naver-15577494","naver-1561345043","naver-1564311945","naver-15758766","naver-15758774","naver-15758855","naver-15782116","naver-15782890","naver-15783497","naver-15794005","naver-1584621715","naver-1589889158","naver-1590924274","naver-1600435806","naver-1621130570","naver-1630476938","naver-1635113941","naver-1640188262","naver-1640561050","naver-1645573820","naver-1655116736","naver-1682297767","naver-1711583756","naver-1745026336","naver-1745712901","naver-1746916338","naver-1748137360","naver-1807166093","naver-1816163276","naver-1822726100","naver-1826560677","naver-1837897655","naver-1839261107","naver-1843458653","naver-1844224792","naver-1857893950","naver-1864063379","naver-1877484471","naver-1890737303","naver-1909241837","naver-1910141235","naver-1927236705","naver-1929276646","naver-19392097","naver-19497051","naver-19593776","naver-1962806729","naver-1965855760","naver-1972566352","naver-19773576","naver-19852503","naver-1993201139","naver-1996760021","naver-1996812391","naver-2012356961","naver-20259750","naver-20306247","naver-20327122","naver-2033685259","naver-2057167607","naver-20969904","naver-2097318243","naver-21052152","naver-21074624","naver-21278678","naver-21668396","naver-30900007","naver-31058075","naver-31191194","naver-31378606","naver-31387667","naver-31413897","naver-32203385","naver-32204333","naver-32756802","naver-32820768","naver-32862799","naver-33165578","naver-333773268","naver-33582738","naver-33940965","naver-33948989","naver-34157610","naver-34266454","naver-34268787","naver-34363040","naver-35418230","naver-35487835","naver-36144022","naver-36690239","naver-36830638","naver-37000063","naver-37084680","naver-37370416","naver-37628242","naver-38275237","naver-38275723","naver-38404118","naver-38623943","naver-38640473","naver-478101336","naver-480090059","naver-547754866","naver-601645716","naver-605490236","naver-762435277","naver-99159174"]) {
            allowedVenueIds.add(venueId);
          }
          for (const venueId of ["naver-1911135363","naver-31159517","naver-11727438","naver-1561283581","naver-2067262245","naver-37067234","naver-18050673","naver-20128398","naver-1101390326","naver-35166575","naver-18049795","naver-36379236","naver-18050259","naver-1528447043","naver-1417314194","naver-13301852","naver-13573708","naver-13573706","naver-13288345","naver-1729534738","naver-116218805","naver-18514716","naver-1858306697","naver-37620545","naver-1060262104","naver-1606157558","naver-229948299","naver-38695562","naver-34818419","naver-1982805189","naver-1228200860","naver-13577036","naver-1076083759","naver-1008457815","naver-11851760","naver-15438614","naver-15439624","naver-35228059","naver-37060588","naver-11691779","naver-35161492","naver-11722939","naver-11851820","naver-15461625","naver-38248441","naver-1836677781","naver-20601514","naver-31047425","naver-1414540354","naver-11590873","naver-1773457234","naver-1960786782","naver-34744320","naver-20103498","naver-1606711630","naver-15648096","naver-37278349","naver-1931911236","naver-37769045","naver-20955845","naver-20256405","naver-1431333892","naver-15293378"]) {
            allowedVenueIds.add(venueId);
          }

          const documentClient = DynamoDBDocumentClient.from(
            new DynamoDBClient({}),
            { marshallOptions: { removeUndefinedValues: true } }
          );

          class HttpError extends Error {
            constructor(statusCode, message) {
              super(message);
              this.statusCode = statusCode;
            }
          }

          function response(statusCode, body) {
            return {
              statusCode,
              headers: {
                "content-type": "application/json; charset=utf-8",
                "cache-control": "no-store"
              },
              body: JSON.stringify(body)
            };
          }

          function bearerToken(event, required) {
            const value = (event.headers && (event.headers.authorization || event.headers.Authorization)) || "";
            const match = /^Bearer\s+(.+)$/i.exec(value);
            if (!match && required) {
              throw new HttpError(401, "카카오 로그인이 필요합니다.");
            }
            return match ? match[1] : null;
          }

          async function verifyKakaoToken(token) {
            let kakaoResponse;
            try {
              kakaoResponse = await fetch("https://kapi.kakao.com/v1/user/access_token_info", {
                method: "GET",
                headers: { Authorization: "Bearer " + token },
                signal: AbortSignal.timeout(4500)
              });
            } catch (error) {
              throw new HttpError(503, "카카오 인증 서버에 연결하지 못했습니다.");
            }

            let tokenInfo;
            let tokenInfoSource;
            try {
              tokenInfoSource = await kakaoResponse.text();
              tokenInfo = JSON.parse(tokenInfoSource);
            } catch (error) {
              throw new HttpError(503, "카카오 인증 응답을 확인하지 못했습니다.");
            }

            if (!kakaoResponse.ok) {
              const errorCode = Number(tokenInfo.code);
              if (errorCode === -1 || kakaoResponse.status === 429 || kakaoResponse.status >= 500) {
                throw new HttpError(503, "카카오 인증 서버가 일시적으로 응답하지 않습니다.");
              }
              throw new HttpError(401, "카카오 로그인이 만료되었습니다.");
            }

            const numericId = /"id"\s*:\s*(\d+)/.exec(tokenInfoSource);
            const kakaoUserId = numericId
              ? numericId[1]
              : (typeof tokenInfo.id === "string" && /^\d+$/.test(tokenInfo.id) ? tokenInfo.id : null);
            if (
              String(tokenInfo.app_id || "") !== kakaoAppId ||
              Number(tokenInfo.expires_in || 0) <= 0 ||
              !kakaoUserId
            ) {
              throw new HttpError(401, "이 서비스에서 발급된 카카오 로그인이 아닙니다.");
            }
            return kakaoUserId;
          }

          function pseudonymousUserId(kakaoUserId) {
            return crypto
              .createHmac("sha256", hmacSecret)
              .update(kakaoAppId + ":" + kakaoUserId)
              .digest("hex");
          }

          function venuePk(venueId) {
            return "VENUE#" + venueId;
          }

          function userSk(userId) {
            return "USER#" + userId;
          }

          function validateVenueIds(raw) {
            const ids = [...new Set(String(raw || "").split(",").map((id) => id.trim()).filter(Boolean))];
            if (!ids.length || ids.length > 50) {
              throw new HttpError(400, "평가 대상을 1개 이상 50개 이하로 요청해 주세요.");
            }
            for (const id of ids) {
              if (!allowedVenueIds.has(id)) {
                throw new HttpError(400, "지원하지 않는 평가 대상입니다.");
              }
            }
            return ids;
          }

          async function batchGetItems(keys) {
            if (!keys.length) return [];
            const items = [];
            let requestItems = {
              [tableName]: {
                Keys: keys,
                ProjectionExpression: "pk, sk, recommendCount, notRecommendCount, choice",
                ConsistentRead: true
              }
            };

            for (let attempt = 0; attempt < 5 && Object.keys(requestItems).length; attempt += 1) {
              const result = await documentClient.send(new BatchGetCommand({ RequestItems: requestItems }));
              items.push(...((result.Responses && result.Responses[tableName]) || []));
              const unprocessedKeys = result.UnprocessedKeys && result.UnprocessedKeys[tableName]
                ? result.UnprocessedKeys[tableName].Keys || []
                : [];
              requestItems = unprocessedKeys.length
                ? {
                    [tableName]: {
                      Keys: unprocessedKeys,
                      ProjectionExpression: "pk, sk, recommendCount, notRecommendCount, choice",
                      ConsistentRead: true
                    }
                  }
                : {};
              if (Object.keys(requestItems).length) {
                const delay = Math.round(30 * (2 ** attempt) + Math.random() * 40);
                await new Promise((resolve) => setTimeout(resolve, delay));
              }
            }
            if (Object.keys(requestItems).length) {
              throw new HttpError(503, "평가 정보를 모두 불러오지 못했습니다.");
            }
            return items;
          }

          async function getSummary(venueId) {
            const result = await documentClient.send(new GetCommand({
              TableName: tableName,
              Key: { pk: venuePk(venueId), sk: "SUMMARY" },
              ProjectionExpression: "recommendCount, notRecommendCount",
              ConsistentRead: true
            }));
            const item = result.Item || {};
            return {
              recommend: Math.max(0, Number(item.recommendCount || 0)),
              notRecommend: Math.max(0, Number(item.notRecommendCount || 0))
            };
          }

          async function readVotes(event) {
            const venueIds = validateVenueIds(
              event.queryStringParameters && event.queryStringParameters.venueIds
            );
            const token = bearerToken(event, false);
            const kakaoUserId = token ? await verifyKakaoToken(token) : null;
            const hashedUserId = kakaoUserId ? pseudonymousUserId(kakaoUserId) : null;

            const keys = [];
            for (const venueId of venueIds) {
              keys.push({ pk: venuePk(venueId), sk: "SUMMARY" });
              if (hashedUserId) {
                keys.push({ pk: venuePk(venueId), sk: userSk(hashedUserId) });
              }
            }

            const items = await batchGetItems(keys);
            const itemMap = new Map(items.map((item) => [item.pk + "|" + item.sk, item]));
            const votes = {};

            for (const venueId of venueIds) {
              const pk = venuePk(venueId);
              const summary = itemMap.get(pk + "|SUMMARY") || {};
              const userVote = hashedUserId
                ? itemMap.get(pk + "|" + userSk(hashedUserId))
                : null;
              const recommend = Math.max(0, Number(summary.recommendCount || 0));
              const notRecommend = Math.max(0, Number(summary.notRecommendCount || 0));
              votes[venueId] = {
                recommend,
                notRecommend,
                score: recommend - notRecommend,
                userChoice: userVote ? userVote.choice : null
              };
            }

            return response(200, { votes });
          }

          async function writeVote(event) {
            const venueId = event.pathParameters && event.pathParameters.venueId;
            if (!allowedVenueIds.has(venueId)) {
              throw new HttpError(400, "지원하지 않는 평가 대상입니다.");
            }

            const token = bearerToken(event, true);
            const kakaoUserId = await verifyKakaoToken(token);
            const hashedUserId = pseudonymousUserId(kakaoUserId);
            const pk = venuePk(venueId);
            const sk = userSk(hashedUserId);

            let body;
            try {
              const source = event.isBase64Encoded
                ? Buffer.from(event.body || "", "base64").toString("utf8")
                : (event.body || "{}");
              body = JSON.parse(source);
            } catch (error) {
              throw new HttpError(400, "요청 형식이 올바르지 않습니다.");
            }

            const newChoice = body.choice;
            if (![null, "recommend", "not_recommend"].includes(newChoice)) {
              throw new HttpError(400, "추천 또는 비추천만 선택할 수 있습니다.");
            }

            const existingResult = await documentClient.send(new GetCommand({
              TableName: tableName,
              Key: { pk, sk },
              ProjectionExpression: "choice",
              ConsistentRead: true
            }));
            const oldChoice = existingResult.Item ? existingResult.Item.choice : null;

            if (oldChoice === newChoice) {
              const current = await getSummary(venueId);
              return response(200, {
                venueId,
                ...current,
                score: current.recommend - current.notRecommend,
                userChoice: newChoice
              });
            }

            const recommendDelta =
              (newChoice === "recommend" ? 1 : 0) - (oldChoice === "recommend" ? 1 : 0);
            const notRecommendDelta =
              (newChoice === "not_recommend" ? 1 : 0) - (oldChoice === "not_recommend" ? 1 : 0);
            const now = new Date().toISOString();

            const addParts = [];
            const names = { "#updatedAt": "updatedAt" };
            const values = { ":updatedAt": now };
            if (recommendDelta) {
              names["#recommendCount"] = "recommendCount";
              values[":recommendDelta"] = recommendDelta;
              addParts.push("#recommendCount :recommendDelta");
            }
            if (notRecommendDelta) {
              names["#notRecommendCount"] = "notRecommendCount";
              values[":notRecommendDelta"] = notRecommendDelta;
              addParts.push("#notRecommendCount :notRecommendDelta");
            }

            const transaction = [{
              Update: {
                TableName: tableName,
                Key: { pk, sk: "SUMMARY" },
                UpdateExpression: "ADD " + addParts.join(", ") + " SET #updatedAt = :updatedAt",
                ExpressionAttributeNames: names,
                ExpressionAttributeValues: values
              }
            }];

            if (newChoice === null) {
              transaction.push({
                Delete: {
                  TableName: tableName,
                  Key: { pk, sk },
                  ConditionExpression: "#choice = :oldChoice",
                  ExpressionAttributeNames: { "#choice": "choice" },
                  ExpressionAttributeValues: { ":oldChoice": oldChoice }
                }
              });
            } else {
              const put = {
                TableName: tableName,
                Item: { pk, sk, choice: newChoice, updatedAt: now }
              };
              if (oldChoice) {
                put.ConditionExpression = "#choice = :oldChoice";
                put.ExpressionAttributeNames = { "#choice": "choice" };
                put.ExpressionAttributeValues = { ":oldChoice": oldChoice };
              } else {
                put.ConditionExpression = "attribute_not_exists(pk)";
              }
              transaction.push({ Put: put });
            }

            try {
              await documentClient.send(new TransactWriteCommand({
                TransactItems: transaction
              }));
            } catch (error) {
              if (error && error.name === "TransactionCanceledException") {
                throw new HttpError(409, "평가가 동시에 변경되었습니다. 다시 시도해 주세요.");
              }
              throw error;
            }

            const current = await getSummary(venueId);
            return response(200, {
              venueId,
              ...current,
              score: current.recommend - current.notRecommend,
              userChoice: newChoice
            });
          }

          async function writeSuggestion(event) {
            const token = bearerToken(event, true);
            const kakaoUserId = await verifyKakaoToken(token);
            const hashedUserId = pseudonymousUserId(kakaoUserId);

            let body;
            try {
              const source = event.isBase64Encoded
                ? Buffer.from(event.body || "", "base64").toString("utf8")
                : (event.body || "{}");
              body = JSON.parse(source);
            } catch (error) {
              throw new HttpError(400, "요청 형식이 올바르지 않습니다.");
            }

            const category = String(body.category || "").trim();
            const target = String(body.target || "").trim();
            const details = String(body.details || "").trim();
            const pageUrl = String(body.pageUrl || "").trim();
            if (!category || category.length > 30) {
              throw new HttpError(400, "수정 유형을 확인해 주세요.");
            }
            if (!target || target.length > 100) {
              throw new HttpError(400, "가게 또는 항목 이름을 100자 이하로 입력해 주세요.");
            }
            if (details.length < 5 || details.length > 1000) {
              throw new HttpError(400, "달라진 내용을 5자 이상 1,000자 이하로 입력해 주세요.");
            }
            if (pageUrl.length > 500) {
              throw new HttpError(400, "페이지 주소가 너무 깁니다.");
            }

            const suggestionId = crypto.randomUUID();
            const now = new Date().toISOString();
            await documentClient.send(new PutCommand({
              TableName: tableName,
              Item: {
                pk: "SUGGESTION#" + suggestionId,
                sk: "SUBMISSION",
                suggestionId,
                userId: hashedUserId,
                category,
                target,
                details,
                pageUrl,
                status: "new",
                createdAt: now
              },
              ConditionExpression: "attribute_not_exists(pk)"
            }));

            return response(201, {
              suggestionId,
              message: "정보 수정 요청을 저장했습니다."
            });
          }

          exports.handler = async (event) => {
            try {
              const method = event.requestContext && event.requestContext.http
                ? event.requestContext.http.method
                : "";
              if (method === "GET" && event.rawPath === "/votes") {
                return await readVotes(event);
              }
              if (method === "PUT" && event.pathParameters && event.pathParameters.venueId) {
                return await writeVote(event);
              }
              if (method === "POST" && event.rawPath === "/suggestions") {
                return await writeSuggestion(event);
              }
              return response(404, { message: "요청한 기능을 찾을 수 없습니다." });
            } catch (error) {
              const statusCode = error instanceof HttpError ? error.statusCode : 500;
              if (statusCode >= 500) {
                console.error("Goyoungo API error", {
                  name: error && error.name,
                  message: error && error.message
                });
              }
              return response(statusCode, {
                message: error instanceof HttpError
                  ? error.message
                  : "요청 처리 중 오류가 발생했습니다."
              });
            }
          };

  VoteApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-http-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "https://goyoungo.com"
          - "https://www.goyoungo.com"
          - "https://test.goyoungo.com"
        AllowMethods:
          - GET
          - POST
          - PUT
          - OPTIONS
        AllowHeaders:
          - authorization
          - content-type
        MaxAge: 300

  VoteIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref VoteApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt VoteFunction.Arn
      PayloadFormatVersion: "2.0"
      TimeoutInMillis: 15000

  ReadVotesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref VoteApi
      RouteKey: "GET /votes"
      Target: !Join
        - /
        - - integrations
          - !Ref VoteIntegration

  WriteVoteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref VoteApi
      RouteKey: "PUT /votes/{venueId}"
      Target: !Join
        - /
        - - integrations
          - !Ref VoteIntegration

  WriteSuggestionRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref VoteApi
      RouteKey: "POST /suggestions"
      Target: !Join
        - /
        - - integrations
          - !Ref VoteIntegration

  VoteStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref VoteApi
      StageName: "$default"
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10

  VoteInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref VoteFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${VoteApi}/*/*/*"

Outputs:
  ApiEndpoint:
    Description: Base URL for the voting API
    Value: !GetAtt VoteApi.ApiEndpoint
  VoteTableName:
    Description: DynamoDB table that stores vote summaries and pseudonymous user votes
    Value: !Ref VoteTable
