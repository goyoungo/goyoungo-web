AWSTemplateFormatVersion: "2010-09-09"
Description: Kakao-account linked venue voting API for goyoungo.com

Parameters:
  KakaoAppId:
    Type: String
    Default: "1470643"
    AllowedPattern: "^[0-9]+$"
    Description: Numeric Kakao application ID expected in verified access tokens
  VoteHmacSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: Random secret used only to pseudonymize Kakao user IDs

Resources:
  VoteTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${AWS::StackName}-votes"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: goyoungo
        - Key: Purpose
          Value: kakao-venue-voting

  VoteFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: VoteTableAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                # TransactWriteItems authorizes each underlying item operation.
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:TransactWriteItems
                Resource: !GetAtt VoteTable.Arn
        - PolicyName: VoteFunctionLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-api:*"

  VoteFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-api"
      RetentionInDays: 14

  VoteFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - VoteFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AWS::StackName}-api"
      Description: Verifies Kakao access tokens and stores one vote per account and venue
      Runtime: nodejs22.x
      Architectures:
        - arm64
      Handler: index.handler
      MemorySize: 256
      Timeout: 12
      Role: !GetAtt VoteFunctionRole.Arn
      Environment:
        Variables:
          VOTE_TABLE_NAME: !Ref VoteTable
          KAKAO_APP_ID: !Ref KakaoAppId
          VOTE_HMAC_SECRET: !Ref VoteHmacSecret
      Code:
        ZipFile: |
          "use strict";

          const crypto = require("node:crypto");
          const { DynamoDBClient } = require("@aws-sdk/client-dynamodb");
          const {
            DynamoDBDocumentClient,
            BatchGetCommand,
            GetCommand,
            TransactWriteCommand
          } = require("@aws-sdk/lib-dynamodb");

          const tableName = process.env.VOTE_TABLE_NAME;
          const kakaoAppId = String(process.env.KAKAO_APP_ID || "");
          const hmacSecret = process.env.VOTE_HMAC_SECRET || "";
          const allowedVenueIds = new Set(["7b4c9321-6ad9-4135-b935-b4360a9f1765","f6c67aca-1c10-4d3a-aa67-72185b20dc56","b0f203d8-fed2-44f8-815a-b713bb48ac11","2ac3c5f5-df1a-4c77-8e83-88e0cef85c7e","0314432b-6c08-4bb8-be69-50ea644597ec","1420ef2b-60e3-801e-858b-d7d8edfa7ea2","5ccd0c61-e45c-4513-8bc8-c61084d21594","c55db185-3763-4c92-9577-5ff3a8a65189","501d9bae-1243-40e9-9429-e64cefd040dc","c1235d93-9a9b-4e43-b007-38621a451bda","aa6db810-af0b-428e-ab6e-1f3a73898416","e650f78d-2069-4907-90a5-074461c5264f","3ed621c0-851b-4ad6-b289-04dcf99baa95","926f8d3f-2999-433e-b735-db00bc228cf6","08d7e1ac-e3a9-4d84-8e1a-6d64f37ca7f1","d5891c1c-91fe-45ce-979e-236cc012128d","47b50e58-068b-44f4-b8ae-2140c6b72f78","5b8e324d-d285-4398-b1ec-21a116c09640","2ff4c403-8e5d-48c7-a2e6-c3077290c0b1","c2e2e2a7-adae-4b1b-a583-dc620ae79bae","de9967f0-8c1d-421d-b4ca-e1705c81c760","2d984e33-78df-4b96-a72c-5354729947b7","afe232bf-3df4-4e51-a92a-3df839f889da","5009f7f9-3d27-47a8-91b9-1a60ca13b0f3","4fe11523-f81f-47e0-9a11-31fad96378fe","cf138220-1c77-4508-ab61-4c853155986e","547b10ab-31b7-4962-bb19-1c53436f1e52","967bc5d3-42d4-409d-ba8a-29dd8cfd7788","66097430-29a9-45fd-a7d4-11a53b59a4af","abffd488-3968-431c-a60d-f6081211e9f1","70cb2d37-7e1b-415e-9677-b57a1c36be1d","34f6b63f-6dfa-4c2d-9f37-5aa36f02264a","eab71ef0-bc21-4d15-ac9b-53dfcbad3e21","44a5288f-7b95-4a7a-b4c2-9d5e1adb6340","2072e5e1-9271-484c-8d37-bb2c07d2dff4","2930ef2b-60e3-81d6-b2cd-c3fc9ea5ccec","2930ef2b-60e3-81aa-a2ec-f62774960714","2930ef2b-60e3-81df-81a1-cf2ca04f21e1","2930ef2b-60e3-813f-aaec-d9f34466f24f","2930ef2b-60e3-8115-9602-cb5becfe726f","2930ef2b-60e3-819b-8524-c9ca563fb41e","2930ef2b-60e3-81b8-9f55-e2dd333cb07d","2930ef2b-60e3-8189-ad75-e4f525fce6c3","2930ef2b-60e3-81d2-b723-dd3995489bb5","2930ef2b-60e3-8145-a8e3-d8a70711aa8a","2930ef2b-60e3-8185-8bb0-f9197b92607f","2930ef2b-60e3-8109-8056-d0cba607be53","2930ef2b-60e3-8154-95d7-c5ace16b2a8e","2930ef2b-60e3-810e-a737-ee22969bccaf","2930ef2b-60e3-8119-80a3-e1f67fa22869","2930ef2b-60e3-811b-92ce-dad10c3bb482","2b60ef2b-60e3-8042-8ca7-f850f4ceb861","2930ef2b-60e3-8145-a7cf-f5d71ab48684","2930ef2b-60e3-81bb-bfd8-e9f8cdcc85f1","2930ef2b-60e3-81f6-8f55-caeb677cdf1a","2930ef2b-60e3-8158-a90f-d99d3e46516c","2930ef2b-60e3-817d-8b0c-d9c9bb028f6c","2930ef2b-60e3-8165-9997-d56356281d8c","2930ef2b-60e3-8190-ae42-db486fcb7fab","2930ef2b-60e3-816c-8a39-cd9ba8546750","2930ef2b-60e3-8142-b1d1-c8e1704227f6","2930ef2b-60e3-817a-9b1a-ffd2e98cf3f3","2930ef2b-60e3-81b4-9526-c7b5321294f1","2930ef2b-60e3-8129-8138-de75fc732e27","2930ef2b-60e3-8138-8e56-d6ca2b53fd7e"]);

          const documentClient = DynamoDBDocumentClient.from(
            new DynamoDBClient({}),
            { marshallOptions: { removeUndefinedValues: true } }
          );

          class HttpError extends Error {
            constructor(statusCode, message) {
              super(message);
              this.statusCode = statusCode;
            }
          }

          function response(statusCode, body) {
            return {
              statusCode,
              headers: {
                "content-type": "application/json; charset=utf-8",
                "cache-control": "no-store"
              },
              body: JSON.stringify(body)
            };
          }

          function bearerToken(event, required) {
            const value = (event.headers && (event.headers.authorization || event.headers.Authorization)) || "";
            const match = /^Bearer\s+(.+)$/i.exec(value);
            if (!match && required) {
              throw new HttpError(401, "카카오 로그인이 필요합니다.");
            }
            return match ? match[1] : null;
          }

          async function verifyKakaoToken(token) {
            let kakaoResponse;
            try {
              kakaoResponse = await fetch("https://kapi.kakao.com/v1/user/access_token_info", {
                method: "GET",
                headers: { Authorization: "Bearer " + token },
                signal: AbortSignal.timeout(4500)
              });
            } catch (error) {
              throw new HttpError(503, "카카오 인증 서버에 연결하지 못했습니다.");
            }

            let tokenInfo;
            let tokenInfoSource;
            try {
              tokenInfoSource = await kakaoResponse.text();
              tokenInfo = JSON.parse(tokenInfoSource);
            } catch (error) {
              throw new HttpError(503, "카카오 인증 응답을 확인하지 못했습니다.");
            }

            if (!kakaoResponse.ok) {
              const errorCode = Number(tokenInfo.code);
              if (errorCode === -1 || kakaoResponse.status === 429 || kakaoResponse.status >= 500) {
                throw new HttpError(503, "카카오 인증 서버가 일시적으로 응답하지 않습니다.");
              }
              throw new HttpError(401, "카카오 로그인이 만료되었습니다.");
            }

            const numericId = /"id"\s*:\s*(\d+)/.exec(tokenInfoSource);
            const kakaoUserId = numericId
              ? numericId[1]
              : (typeof tokenInfo.id === "string" && /^\d+$/.test(tokenInfo.id) ? tokenInfo.id : null);
            if (
              String(tokenInfo.app_id || "") !== kakaoAppId ||
              Number(tokenInfo.expires_in || 0) <= 0 ||
              !kakaoUserId
            ) {
              throw new HttpError(401, "이 서비스에서 발급된 카카오 로그인이 아닙니다.");
            }
            return kakaoUserId;
          }

          function pseudonymousUserId(kakaoUserId) {
            return crypto
              .createHmac("sha256", hmacSecret)
              .update(kakaoAppId + ":" + kakaoUserId)
              .digest("hex");
          }

          function venuePk(venueId) {
            return "VENUE#" + venueId;
          }

          function userSk(userId) {
            return "USER#" + userId;
          }

          function validateVenueIds(raw) {
            const ids = [...new Set(String(raw || "").split(",").map((id) => id.trim()).filter(Boolean))];
            if (!ids.length || ids.length > 50) {
              throw new HttpError(400, "평가 대상을 1개 이상 50개 이하로 요청해 주세요.");
            }
            for (const id of ids) {
              if (!allowedVenueIds.has(id)) {
                throw new HttpError(400, "지원하지 않는 평가 대상입니다.");
              }
            }
            return ids;
          }

          async function batchGetItems(keys) {
            if (!keys.length) return [];
            const items = [];
            let requestItems = {
              [tableName]: {
                Keys: keys,
                ProjectionExpression: "pk, sk, recommendCount, notRecommendCount, choice",
                ConsistentRead: true
              }
            };

            for (let attempt = 0; attempt < 5 && Object.keys(requestItems).length; attempt += 1) {
              const result = await documentClient.send(new BatchGetCommand({ RequestItems: requestItems }));
              items.push(...((result.Responses && result.Responses[tableName]) || []));
              const unprocessedKeys = result.UnprocessedKeys && result.UnprocessedKeys[tableName]
                ? result.UnprocessedKeys[tableName].Keys || []
                : [];
              requestItems = unprocessedKeys.length
                ? {
                    [tableName]: {
                      Keys: unprocessedKeys,
                      ProjectionExpression: "pk, sk, recommendCount, notRecommendCount, choice",
                      ConsistentRead: true
                    }
                  }
                : {};
              if (Object.keys(requestItems).length) {
                const delay = Math.round(30 * (2 ** attempt) + Math.random() * 40);
                await new Promise((resolve) => setTimeout(resolve, delay));
              }
            }
            if (Object.keys(requestItems).length) {
              throw new HttpError(503, "평가 정보를 모두 불러오지 못했습니다.");
            }
            return items;
          }

          async function getSummary(venueId) {
            const result = await documentClient.send(new GetCommand({
              TableName: tableName,
              Key: { pk: venuePk(venueId), sk: "SUMMARY" },
              ProjectionExpression: "recommendCount, notRecommendCount",
              ConsistentRead: true
            }));
            const item = result.Item || {};
            return {
              recommend: Math.max(0, Number(item.recommendCount || 0)),
              notRecommend: Math.max(0, Number(item.notRecommendCount || 0))
            };
          }

          async function readVotes(event) {
            const venueIds = validateVenueIds(
              event.queryStringParameters && event.queryStringParameters.venueIds
            );
            const token = bearerToken(event, false);
            const kakaoUserId = token ? await verifyKakaoToken(token) : null;
            const hashedUserId = kakaoUserId ? pseudonymousUserId(kakaoUserId) : null;

            const keys = [];
            for (const venueId of venueIds) {
              keys.push({ pk: venuePk(venueId), sk: "SUMMARY" });
              if (hashedUserId) {
                keys.push({ pk: venuePk(venueId), sk: userSk(hashedUserId) });
              }
            }

            const items = await batchGetItems(keys);
            const itemMap = new Map(items.map((item) => [item.pk + "|" + item.sk, item]));
            const votes = {};

            for (const venueId of venueIds) {
              const pk = venuePk(venueId);
              const summary = itemMap.get(pk + "|SUMMARY") || {};
              const userVote = hashedUserId
                ? itemMap.get(pk + "|" + userSk(hashedUserId))
                : null;
              const recommend = Math.max(0, Number(summary.recommendCount || 0));
              const notRecommend = Math.max(0, Number(summary.notRecommendCount || 0));
              votes[venueId] = {
                recommend,
                notRecommend,
                score: recommend - notRecommend,
                userChoice: userVote ? userVote.choice : null
              };
            }

            return response(200, { votes });
          }

          async function writeVote(event) {
            const venueId = event.pathParameters && event.pathParameters.venueId;
            if (!allowedVenueIds.has(venueId)) {
              throw new HttpError(400, "지원하지 않는 평가 대상입니다.");
            }

            const token = bearerToken(event, true);
            const kakaoUserId = await verifyKakaoToken(token);
            const hashedUserId = pseudonymousUserId(kakaoUserId);
            const pk = venuePk(venueId);
            const sk = userSk(hashedUserId);

            let body;
            try {
              const source = event.isBase64Encoded
                ? Buffer.from(event.body || "", "base64").toString("utf8")
                : (event.body || "{}");
              body = JSON.parse(source);
            } catch (error) {
              throw new HttpError(400, "요청 형식이 올바르지 않습니다.");
            }

            const newChoice = body.choice;
            if (![null, "recommend", "not_recommend"].includes(newChoice)) {
              throw new HttpError(400, "추천 또는 비추천만 선택할 수 있습니다.");
            }

            const existingResult = await documentClient.send(new GetCommand({
              TableName: tableName,
              Key: { pk, sk },
              ProjectionExpression: "choice",
              ConsistentRead: true
            }));
            const oldChoice = existingResult.Item ? existingResult.Item.choice : null;

            if (oldChoice === newChoice) {
              const current = await getSummary(venueId);
              return response(200, {
                venueId,
                ...current,
                score: current.recommend - current.notRecommend,
                userChoice: newChoice
              });
            }

            const recommendDelta =
              (newChoice === "recommend" ? 1 : 0) - (oldChoice === "recommend" ? 1 : 0);
            const notRecommendDelta =
              (newChoice === "not_recommend" ? 1 : 0) - (oldChoice === "not_recommend" ? 1 : 0);
            const now = new Date().toISOString();

            const addParts = [];
            const names = { "#updatedAt": "updatedAt" };
            const values = { ":updatedAt": now };
            if (recommendDelta) {
              names["#recommendCount"] = "recommendCount";
              values[":recommendDelta"] = recommendDelta;
              addParts.push("#recommendCount :recommendDelta");
            }
            if (notRecommendDelta) {
              names["#notRecommendCount"] = "notRecommendCount";
              values[":notRecommendDelta"] = notRecommendDelta;
              addParts.push("#notRecommendCount :notRecommendDelta");
            }

            const transaction = [{
              Update: {
                TableName: tableName,
                Key: { pk, sk: "SUMMARY" },
                UpdateExpression: "ADD " + addParts.join(", ") + " SET #updatedAt = :updatedAt",
                ExpressionAttributeNames: names,
                ExpressionAttributeValues: values
              }
            }];

            if (newChoice === null) {
              transaction.push({
                Delete: {
                  TableName: tableName,
                  Key: { pk, sk },
                  ConditionExpression: "#choice = :oldChoice",
                  ExpressionAttributeNames: { "#choice": "choice" },
                  ExpressionAttributeValues: { ":oldChoice": oldChoice }
                }
              });
            } else {
              const put = {
                TableName: tableName,
                Item: { pk, sk, choice: newChoice, updatedAt: now }
              };
              if (oldChoice) {
                put.ConditionExpression = "#choice = :oldChoice";
                put.ExpressionAttributeNames = { "#choice": "choice" };
                put.ExpressionAttributeValues = { ":oldChoice": oldChoice };
              } else {
                put.ConditionExpression = "attribute_not_exists(pk)";
              }
              transaction.push({ Put: put });
            }

            try {
              await documentClient.send(new TransactWriteCommand({
                TransactItems: transaction
              }));
            } catch (error) {
              if (error && error.name === "TransactionCanceledException") {
                throw new HttpError(409, "평가가 동시에 변경되었습니다. 다시 시도해 주세요.");
              }
              throw error;
            }

            const current = await getSummary(venueId);
            return response(200, {
              venueId,
              ...current,
              score: current.recommend - current.notRecommend,
              userChoice: newChoice
            });
          }

          exports.handler = async (event) => {
            try {
              const method = event.requestContext && event.requestContext.http
                ? event.requestContext.http.method
                : "";
              if (method === "GET" && event.rawPath === "/votes") {
                return await readVotes(event);
              }
              if (method === "PUT" && event.pathParameters && event.pathParameters.venueId) {
                return await writeVote(event);
              }
              return response(404, { message: "요청한 기능을 찾을 수 없습니다." });
            } catch (error) {
              const statusCode = error instanceof HttpError ? error.statusCode : 500;
              if (statusCode >= 500) {
                console.error("Vote API error", {
                  name: error && error.name,
                  message: error && error.message
                });
              }
              return response(statusCode, {
                message: error instanceof HttpError
                  ? error.message
                  : "평가 처리 중 오류가 발생했습니다."
              });
            }
          };

  VoteApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-http-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "https://goyoungo.com"
          - "https://www.goyoungo.com"
          - "https://test.goyoungo.com"
        AllowMethods:
          - GET
          - PUT
          - OPTIONS
        AllowHeaders:
          - authorization
          - content-type
        MaxAge: 300

  VoteIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref VoteApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt VoteFunction.Arn
      PayloadFormatVersion: "2.0"
      TimeoutInMillis: 15000

  ReadVotesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref VoteApi
      RouteKey: "GET /votes"
      Target: !Join
        - /
        - - integrations
          - !Ref VoteIntegration

  WriteVoteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref VoteApi
      RouteKey: "PUT /votes/{venueId}"
      Target: !Join
        - /
        - - integrations
          - !Ref VoteIntegration

  VoteStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref VoteApi
      StageName: "$default"
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10

  VoteInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref VoteFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${VoteApi}/*/*/*"

Outputs:
  ApiEndpoint:
    Description: Base URL for the voting API
    Value: !GetAtt VoteApi.ApiEndpoint
  VoteTableName:
    Description: DynamoDB table that stores vote summaries and pseudonymous user votes
    Value: !Ref VoteTable
